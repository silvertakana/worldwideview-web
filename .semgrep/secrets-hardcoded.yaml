rules:
  - id: hardcoded-bearer-token-comparison
    pattern-either:
      - pattern: |
          $REQ.headers.get("authorization") !== "Bearer $TOKEN"
      - pattern: |
          $REQ.headers.get("authorization") != "Bearer $TOKEN"
      - pattern: |
          $REQ.headers.get("Authorization") !== "Bearer $TOKEN"
      - pattern: |
          $REQ.headers.get("Authorization") != "Bearer $TOKEN"
    message: Hardcoded bearer token comparison - use environment variable
    languages: [typescript]
    severity: ERROR

  - id: hardcoded-api-key
    patterns:
      - pattern: |
          process.env.$VAR || "$FALLBACK"
      - metavariable-regex:
          metavariable: $FALLBACK
          regex: ^.{16,}$
    message: Long hardcoded fallback may be a secret - avoid hardcoded secrets
    languages: [typescript]
    severity: WARNING

  - id: api-key-header-hardcoded
    pattern-either:
      - pattern: |
          "x-api-key": "$KEY"
      - pattern: |
          "X-API-Key": "$KEY"
      - pattern: |
          "X-Api-Key": "$KEY"
    message: Hardcoded API key in request header - use environment variable
    languages: [typescript]
    severity: ERROR
