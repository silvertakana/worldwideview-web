name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm lint || echo "Lint not configured yet"
      - name: Test
        run: pnpm test || echo "No tests configured yet"
      - name: Audit
        continue-on-error: true
        run: pnpm audit --audit-level high
      - name: Build
        run: pnpm build
